version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: beaverdash_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: beaverdash_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  identity-service:
    image: beaverdash-identity-service
    build:
      context: .
      dockerfile: IdentityService/src/Identity.API/Dockerfile
    container_name: beaverdash_identity_service
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5001
      - Kestrel__Endpoints__Http__Url=http://*:5001
      - IDENTITY_DB_CONNECTION=Host=postgres;Port=5432;Database=beaverdash_identity_db;Username=postgres;Password=${POSTGRES_PASSWORD:-password}
      - JWT_SECRET=${JWT_SECRET}
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_USER=${RABBITMQ_USER:-guest}
      - RABBITMQ_PASS=${RABBITMQ_PASS:-guest}
    ports:
      - "5001:5001"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  pm-service:
    image: beaverdash-pm-service
    build:
      context: .
      dockerfile: ProjectManagementService/src/PM.API/Dockerfile
    container_name: beaverdash_pm_service
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5002
      - Kestrel__Endpoints__Http__Url=http://*:5002
      - PM_DB_CONNECTION=Host=postgres;Port=5432;Database=beaverdash_pm_db;Username=postgres;Password=${POSTGRES_PASSWORD:-password}
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_USER=${RABBITMQ_USER:-guest}
      - RABBITMQ_PASS=${RABBITMQ_PASS:-guest}
      - AI_ASSISTANT_SERVICE_URL=http://ai-assistant-service:5003
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_SENDER_NAME=${SMTP_SENDER_NAME}
      - SMTP_SENDER_EMAIL=${SMTP_SENDER_EMAIL}
      - EMAIL_LOGO_URL=${EMAIL_LOGO_URL}
      - FRONTEND_BASE_URL=${FRONTEND_BASE_URL}
    ports:
      - "5002:5002"
    volumes:
      - pm_uploads:/app/wwwroot/uploads
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  ai-assistant-service:
    image: beaverdash-ai-assistant-service
    build:
      context: ./AIAssistantService
      dockerfile: Dockerfile
    container_name: beaverdash_ai_assistant_service
    environment:
      - ASSISTANT_DB_CONNECTION=postgresql://postgres:${POSTGRES_PASSWORD:-password}@postgres:5432/beaverdash_ai_assistant_db
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GITHUB_MODEL_TOKEN=${GITHUB_MODEL_TOKEN}
      - PM_SERVICE_BASE_URL=http://pm-service:5002
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_USER=${RABBITMQ_USER:-guest}
      - RABBITMQ_PASS=${RABBITMQ_PASS:-guest}
    ports:
      - "5003:5003"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  api-gateway:
    image: beaverdash-api-gateway
    build:
      context: .
      dockerfile: ApiGateway/Dockerfile
    container_name: beaverdash_api_gateway
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5000
      - Kestrel__Endpoints__Http__Url=http://*:5000
      - JWT_SECRET=${JWT_SECRET}
      - ReverseProxy__Clusters__identity-cluster__Destinations__destination1__Address=http://identity-service:5001
      - ReverseProxy__Clusters__pm-cluster__Destinations__destination1__Address=http://pm-service:5002
      - ReverseProxy__Clusters__assistant-cluster__Destinations__destination1__Address=http://ai-assistant-service:5003
      - FRONTEND_BASE_URL=${FRONTEND_BASE_URL}
    ports:
      - "5000:5000"
    depends_on:
      - identity-service
      - pm-service
      - ai-assistant-service

volumes:
  postgres_data:
  pm_uploads:
